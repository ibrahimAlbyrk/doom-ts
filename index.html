<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOOM-TS</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
        overflow: hidden;
      }
      #screen {
        /* Canvas attribute size is the internal render resolution (960x540 default).
           CSS scales it up with nearest-neighbor for the chunky DOOM look. */
        display: block;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        object-fit: contain;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="960" height="540"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
