<!doctype html>
<!-- THROWAWAY DEV-HARNESS for the raycaster renderer. Dev-only; not a build entry. -->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Raycaster Dev Harness</title>
    <style>
      html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
      /* Canvas attr size = internal render res; CSS upscales nearest-neighbor. */
      #screen {
        display: block;
        width: 100vw;
        height: 100vh;
        image-rendering: pixelated;
        object-fit: contain;
        background: #000;
      }
      #help {
        position: fixed; top: 8px; left: 8px; color: #9f9; font: 12px monospace;
        text-shadow: 0 0 2px #000; pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="screen" width="480" height="270"></canvas>
    <div id="help">W/S fwd · A/D strafe · ←/→ turn — render harness (fallback textures)</div>
    <script type="module" src="./dev-harness.ts"></script>
  </body>
</html>
